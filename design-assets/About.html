<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phoenix Pulsar — About (standalone component)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- shared design tokens + base body styles -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/about.css" />

  <style>
    /* standalone niceties: light theme + a small theme toggle */
    body { background: var(--bg); }
    .sa-bar {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 920px; margin: 0 auto; padding: 22px var(--gutter) 0;
    }
    .sa-mark { font-family: var(--mono); font-size: 12px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; }
    .sa-toggle {
      width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--hairline);
      background: var(--surface); color: var(--ink); cursor: pointer; display: grid; place-items: center;
    }
    .sa-toggle:active { transform: scale(.92); }
    .sa-toggle svg { width: 17px; height: 17px; }
  </style>
</head>
<body>
  <div class="sa-bar">
    <span class="sa-mark">phoenix · pulsar — about</span>
    <button class="sa-toggle" id="sa-toggle" aria-label="Toggle theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z"/></svg>
    </button>
  </div>

  <div id="about-root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#f4f3f0"/>
      <circle cx="50" cy="50" r="13" fill="none" stroke="#d3d0c9" stroke-width="2"/>
      <circle cx="50" cy="50" r="5" fill="#e8541e"/>
      <rect x="30" y="72" width="40" height="3" rx="1.5" fill="#141414"/>
      <rect x="38" y="80" width="24" height="3" rx="1.5" fill="#8a8782"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script type="text/babel" src="js/about.jsx"></script>
  <script type="text/babel">
    document.documentElement.classList.remove("no-js");
    document.documentElement.setAttribute("data-theme", "light");
    ReactDOM.createRoot(document.getElementById("about-root")).render(<AboutSection defaultMode="small" />);
    document.getElementById("sa-toggle").addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme");
      document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
    });
  </script>
</body>
</html>
